apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse-server
  namespace: pmo-copilot
  labels:
    app: langfuse-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langfuse-server
  template:
    metadata:
      labels:
        app: langfuse-server
    spec:
      containers:
        - name: langfuse
          image: langfuse/langfuse:2
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              value: "postgresql://langfuse:langfuse_pass@langfuse-postgres:5432/langfuse"
            - name: NEXTAUTH_SECRET
              value: "pmo-copilot-secret-key-2026"
            - name: SALT
              value: "pmo-copilot-salt-2026"
            - name: NEXTAUTH_URL
              value: "http://192.168.1.32:30300"
            - name: TELEMETRY_ENABLED
              value: "false"
            - name: LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES
              value: "false"
            - name: HOSTNAME
              value: "0.0.0.0"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /api/public/health
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/public/health
              port: 3000
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: langfuse-server
  namespace: pmo-copilot
  labels:
    app: langfuse-server
spec:
  type: NodePort
  selector:
    app: langfuse-server
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: 3000
      nodePort: 30300
